syntax = "proto3";

package virtufit.simulation;

// Service de simulation physique textile

service SimulationService {
  rpc StartSimulation   (SimulationRequest)  returns (SimulationResponse);
  rpc StreamSimulation  (SimulationRequest)  returns (stream SimulationFrame);
  rpc GetFitAnalysis    (FitAnalysisRequest) returns (FitAnalysisResponse);
  rpc GetClothingFrame  (FrameRequest)       returns (ClothingFrameData);
}

// Requêtes

message SimulationRequest {
  string session_id    = 1;
  string user_id       = 2;
  string avatar_id     = 3;
  string clothing_id   = 4;
  AvatarSimData   avatar   = 5;
  ClothingSimData clothing = 6;
  string animation_type    = 7;
}

message AvatarSimData {
  repeated float smpl_betas  = 1;
  repeated float smpl_thetas = 2;
  float height_cm            = 3;
  float weight_kg            = 4;
}

message ClothingSimData {
  string mesh_reference   = 1;
  float  elasticity_coeff = 2;
  float  friction_coeff   = 3;
  float  weight_per_sqm   = 4;
  string fabric_type      = 5;
}

message FitAnalysisRequest {
  string session_id = 1;
  string user_id    = 2;
}

message FrameRequest {
  string session_id  = 1;
  int32  frame_index = 2;
}

// Réponses

message SimulationResponse {
  string session_id    = 1;
  string status        = 2;
  float  simulation_ms = 3;
  FitAnalysisResponse fit_analysis = 4;
  int32  frame_count   = 5;
}

message SimulationFrame {
  string session_id   = 1;
  int32  frame_number = 2;
  bytes  frame_data   = 3;
  float  progress     = 4;
  float  energy       = 5;
}

message ClothingFrameData {
  string        session_id      = 1;
  int32         frame_index     = 2;
  repeated float vertex_deltas  = 3;
  repeated float normals        = 4;
  float         energy          = 5;
  string        mesh_reference  = 6;
  ClothingMetadata metadata     = 7;
}

message ClothingMetadata {
  string fabric_type      = 1;
  float  elasticity_coeff = 2;
  float  friction_coeff   = 3;
  int32  vertex_count     = 4;
  string animation_type   = 5;
}

message FitAnalysisResponse {
  string session_id              = 1;
  repeated TensionZone tensions  = 2;
  string overall_fit             = 3;
  float  fit_score               = 4;
  repeated string recommendations = 5;
  string size_suggestion         = 6;
}

message TensionZone {
  string zone_name     = 1;
  string tension_level = 2;
  float  tension_value = 3;
  string recommendation = 4;
}