name: virtufit-dev

services:

  postgres:
    image: postgres:16-alpine
    container_name: virtufit-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB:       virtufit_db
      POSTGRES_USER:     virtufit_user
      POSTGRES_PASSWORD: virtufit_password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U virtufit_user -d virtufit_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7-jammy
    container_name: virtufit-mongo-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: virtufit
    volumes:
      - mongo_dev_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
    name: virtufit-postgres-dev-data
  mongo_dev_data:
    name: virtufit-mongo-dev-data